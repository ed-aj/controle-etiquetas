<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Controle de Etiquetas e Lotes</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#EAE3D3;
  --surface:#FFFFFF;
  --surface-alt:#F4EEE0;
  --ink:#211D17;
  --ink-soft:#6E6552;
  --ink-faint:#9C927B;
  --accent:#2F6F5E;
  --accent-dark:#1E4B3E;
  --accent-soft:#DCEAE3;
  --warn:#A73B2A;
  --warn-soft:#F2DAD2;
  --blue:#1E4E78;
  --blue-soft:#DCE6EF;
  --border:#D6CBB0;
  --border-strong:#B8AB88;
  --radius:3px;
  --shadow:0 1px 2px rgba(33,29,23,0.08), 0 4px 10px rgba(33,29,23,0.06);
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background:var(--bg);
  background-image:
    linear-gradient(var(--border) 1px, transparent 1px),
    linear-gradient(90deg, var(--border) 1px, transparent 1px);
  background-size:28px 28px;
  background-attachment:fixed;
  color:var(--ink);
  font-family:'Inter',sans-serif;
  font-size:14px;
  line-height:1.45;
  min-height:100vh;
  min-width:1240px; /* desktop only */
}
::selection{background:var(--accent-soft);}
h1,h2,h3,h4{font-family:'Oswald',sans-serif; text-transform:uppercase; letter-spacing:.03em; margin:0; color:var(--ink);}
.mono{font-family:'IBM Plex Mono',monospace;}
button{font-family:'Inter',sans-serif; cursor:pointer;}
input,select,textarea{font-family:'Inter',sans-serif; font-size:13.5px;}

/* ---------- Login screen ---------- */
.login-screen{
  position:fixed; inset:0; display:flex; align-items:center; justify-content:center;
  background:var(--bg);
  background-image:
    linear-gradient(var(--border) 1px, transparent 1px),
    linear-gradient(90deg, var(--border) 1px, transparent 1px);
  background-size:28px 28px;
  z-index:500;
}
.login-card{
  width:380px; background:var(--surface); border:1px solid var(--border);
  border-radius:var(--radius); box-shadow:0 20px 50px rgba(33,29,23,.18);
  padding:32px 30px 26px;
}
.login-card .brand-mark{
  width:40px; height:40px; border:2px dashed var(--warn); border-radius:2px;
  display:flex; align-items:center; justify-content:center; color:var(--warn);
  font-family:'IBM Plex Mono'; font-weight:600; font-size:12px; transform:rotate(-4deg);
  margin-bottom:14px;
}
.login-card h2{font-size:16px; margin-bottom:4px;}
.login-card p{margin:0 0 20px; font-size:12.5px; color:var(--ink-soft); text-transform:none; letter-spacing:0;}
.login-error{background:var(--warn-soft); color:var(--warn); border:1px solid #E3B7AA; border-radius:var(--radius); padding:8px 10px; font-size:12px; margin-bottom:14px;}

/* ---------- App shell ---------- */
#app-shell{max-width:1180px; min-width:1180px; margin:0 auto; padding:20px 20px 60px;}

.topbar{
  display:flex; align-items:center; justify-content:space-between; gap:16px;
  background:var(--ink); color:var(--bg);
  padding:14px 20px; border-radius:var(--radius);
  margin-bottom:18px;
  box-shadow:var(--shadow);
}
.brand{display:flex; align-items:center; gap:10px;}
.brand-mark{
  width:34px; height:34px; border:2px dashed var(--warn); border-radius:2px;
  display:flex; align-items:center; justify-content:center;
  color:var(--warn); font-family:'IBM Plex Mono'; font-weight:600; font-size:11px;
  transform:rotate(-4deg); flex-shrink:0;
}
.brand-text h1{font-size:16px; color:#fff; letter-spacing:.06em;}
.brand-text p{margin:2px 0 0; font-size:11px; color:#B9B2A0; text-transform:none; letter-spacing:0;}
.topbar-right{display:flex; align-items:center; gap:14px;}
.record-counter{font-family:'IBM Plex Mono'; font-size:11.5px; color:#C9C2AE; white-space:nowrap;}
.record-counter b{color:#fff;}
.user-pill{font-family:'IBM Plex Mono'; font-size:11px; color:#C9C2AE; white-space:nowrap;}
.btn-danger-ghost{
  background:transparent; border:1px solid #6B4038; color:#E8B6A8;
  padding:7px 12px; border-radius:var(--radius); font-size:12px; font-weight:600;
  text-transform:uppercase; letter-spacing:.04em;
}
.btn-danger-ghost:hover{background:#3A2420;}
.btn-logout-ghost{
  background:transparent; border:1px solid #4A4535; color:#D8D2BE;
  padding:7px 12px; border-radius:var(--radius); font-size:12px; font-weight:600;
  text-transform:uppercase; letter-spacing:.04em;
}
.btn-logout-ghost:hover{background:#3A362A;}

.tabs{display:flex; gap:4px; margin-bottom:18px; border-bottom:2px solid var(--border-strong);}
.tab-btn{
  background:transparent; border:none; padding:10px 18px 12px;
  font-family:'Oswald',sans-serif; text-transform:uppercase; letter-spacing:.05em;
  font-size:13px; font-weight:600; color:var(--ink-soft);
  border-bottom:3px solid transparent; margin-bottom:-2px;
}
.tab-btn.active{color:var(--accent-dark); border-bottom-color:var(--accent);}
.tab-btn:hover:not(.active){color:var(--ink);}

.panel{
  background:var(--surface); border:1px solid var(--border);
  border-radius:var(--radius); box-shadow:var(--shadow); padding:22px;
}
.panel + .panel{margin-top:16px;}

/* ---------- Buttons ---------- */
.btn{
  background:var(--accent); color:#fff; border:none;
  padding:9px 16px; border-radius:var(--radius); font-weight:600; font-size:13px;
  letter-spacing:.02em;
}
.btn:hover{background:var(--accent-dark);}
.btn.secondary{background:var(--surface-alt); color:var(--ink); border:1px solid var(--border-strong);}
.btn.secondary:hover{background:var(--border);}
.btn.small{padding:5px 10px; font-size:12px;}
.btn.warn{background:var(--warn);}
.btn.warn:hover{background:#832C1F;}
.btn:disabled{opacity:.45; cursor:not-allowed;}

/* ---------- Breadcrumb ---------- */
.crumbs{display:flex; align-items:center; flex-wrap:wrap; gap:6px; margin-bottom:18px; font-family:'Oswald',sans-serif; text-transform:uppercase; font-size:12.5px; letter-spacing:.04em;}
.crumb{background:var(--surface-alt); border:1px solid var(--border); padding:6px 12px; border-radius:var(--radius); color:var(--ink-soft);}
.crumb.active{background:var(--accent-soft); color:var(--accent-dark); border-color:var(--accent);}
.crumb-btn{background:none; border:none; font:inherit; text-transform:inherit; letter-spacing:inherit; padding:0; color:inherit;}
.crumb-sep{color:var(--ink-faint);}

/* ---------- Card grids ---------- */
.grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(240px,1fr)); gap:12px;}
.pick-card{
  background:var(--surface); border:1px solid var(--border); border-radius:var(--radius);
  padding:14px 16px; text-align:left; box-shadow:var(--shadow);
  transition:border-color .12s, transform .12s;
}
.pick-card:hover{border-color:var(--accent); transform:translateY(-1px);}
.pick-card .pc-eyebrow{font-family:'IBM Plex Mono'; font-size:10.5px; color:var(--ink-faint); text-transform:uppercase; letter-spacing:.06em; margin-bottom:4px;}
.pick-card .pc-title{font-family:'Oswald',sans-serif; font-size:15px; font-weight:600; text-transform:uppercase; letter-spacing:.02em; line-height:1.25; margin-bottom:8px;}
.pick-card .pc-meta{display:flex; flex-wrap:wrap; gap:6px;}
.tag{font-family:'IBM Plex Mono'; font-size:10.5px; background:var(--surface-alt); border:1px solid var(--border); padding:2px 7px; border-radius:2px; color:var(--ink-soft);}
.tag.blue{background:var(--blue-soft); color:var(--blue); border-color:#B9CBDD;}
.tag.accent{background:var(--accent-soft); color:var(--accent-dark); border-color:#B9D6C9;}

.empty-state{
  border:1.5px dashed var(--border-strong); border-radius:var(--radius);
  padding:34px 20px; text-align:center; color:var(--ink-soft);
}
.empty-state h3{font-size:14px; color:var(--ink); margin-bottom:6px;}
.empty-state p{margin:0 0 14px; font-size:13px;}

/* ---------- Lote stamp (signature element) ---------- */
.stamp{
  display:inline-flex; align-items:center; gap:6px;
  border:2px dashed var(--warn); color:var(--warn-dark,#832C1F);
  font-family:'IBM Plex Mono'; font-weight:600; font-size:15px;
  padding:5px 12px; border-radius:2px; transform:rotate(-2.2deg);
  background:rgba(167,59,42,0.04);
}
.stamp small{font-family:'Inter'; font-weight:600; text-transform:uppercase; font-size:9.5px; letter-spacing:.06em; opacity:.75;}

/* ---------- Etiqueta final card ---------- */
.etiqueta-final{
  background:var(--surface-alt); border:1px solid var(--border-strong);
  border-radius:var(--radius); padding:18px 20px; margin-bottom:14px;
}
.etiqueta-final.inactive{opacity:.65;}
.ef-top{display:flex; justify-content:space-between; align-items:flex-start; gap:14px; flex-wrap:wrap; margin-bottom:12px;}
.ef-name{font-family:'Oswald',sans-serif; font-size:17px; font-weight:600; text-transform:uppercase; letter-spacing:.01em; color:var(--ink); max-width:520px;}
.ef-status{font-family:'IBM Plex Mono'; font-size:10.5px; text-transform:uppercase; letter-spacing:.05em; padding:3px 8px; border-radius:2px;}
.ef-status.on{background:var(--accent-soft); color:var(--accent-dark);}
.ef-status.off{background:var(--surface); color:var(--ink-faint); border:1px solid var(--border);}
.ef-row{display:flex; flex-wrap:wrap; gap:18px; font-size:12.5px; color:var(--ink-soft); margin-top:10px;}
.ef-row div b{display:block; font-family:'IBM Plex Mono'; font-size:10px; text-transform:uppercase; letter-spacing:.05em; color:var(--ink-faint); margin-bottom:2px; font-weight:600;}
.ef-obs{margin-top:10px; font-size:12.5px; color:var(--ink-soft); font-style:italic;}
.ef-actions{display:flex; gap:8px; margin-top:12px;}

/* ---------- Forms ---------- */
.field{margin-bottom:14px;}
.field label{display:block; font-family:'Oswald',sans-serif; font-size:11.5px; text-transform:uppercase; letter-spacing:.04em; color:var(--ink-soft); margin-bottom:5px;}
.field input,.field select,.field textarea{
  width:100%; padding:8px 10px; border:1px solid var(--border-strong); border-radius:var(--radius);
  background:#fff; color:var(--ink);
}
.field input:focus,.field select:focus,.field textarea:focus{outline:2px solid var(--accent); outline-offset:1px; border-color:var(--accent);}
.field-hint{font-size:11px; color:var(--ink-faint); margin-top:4px;}
.field-row{display:grid; grid-template-columns:1fr 1fr; gap:14px;}

/* ---------- Table ---------- */
.table-wrap{overflow-x:auto; border:1px solid var(--border); border-radius:var(--radius);}
table{border-collapse:collapse; width:100%; font-size:12.5px;}
thead th{
  background:var(--ink); color:var(--bg); text-align:left; padding:9px 10px;
  font-family:'Oswald'; font-size:10.5px; text-transform:uppercase; letter-spacing:.05em; white-space:nowrap;
}
tbody td{padding:8px 10px; border-bottom:1px solid var(--border); white-space:nowrap; color:var(--ink);}
tbody tr:hover{background:var(--surface-alt);}
tbody tr:last-child td{border-bottom:none;}
.sku-cell{font-family:'IBM Plex Mono'; font-weight:600;}

/* ---------- Toolbar ---------- */
.toolbar{display:flex; align-items:center; justify-content:space-between; gap:12px; flex-wrap:wrap; margin-bottom:16px;}
.toolbar-left{display:flex; align-items:center; gap:10px; flex-wrap:wrap;}
.search-input{padding:8px 12px; border:1px solid var(--border-strong); border-radius:var(--radius); min-width:220px;}
.count-pill{font-family:'IBM Plex Mono'; font-size:11px; color:var(--ink-soft); background:var(--surface-alt); padding:5px 10px; border-radius:12px; border:1px solid var(--border);}

/* ---------- Modal ---------- */
.modal-backdrop{position:fixed; inset:0; background:rgba(33,29,23,0.55); display:flex; align-items:flex-start; justify-content:center; padding:5vh 16px; z-index:100; overflow-y:auto;}
.modal{background:#fff; border-radius:var(--radius); width:100%; max-width:520px; box-shadow:0 20px 50px rgba(0,0,0,.3); animation:modalIn .15s ease-out;}
@keyframes modalIn{from{opacity:0; transform:translateY(-8px);} to{opacity:1; transform:translateY(0);}}
.modal-head{display:flex; justify-content:space-between; align-items:center; padding:16px 20px; border-bottom:1px solid var(--border);}
.modal-head h3{font-size:14px;}
.modal-close{background:none; border:none; font-size:20px; line-height:1; color:var(--ink-faint); padding:2px 6px;}
.modal-close:hover{color:var(--ink);}
.modal-body{padding:20px; max-height:70vh; overflow-y:auto;}
.modal-foot{display:flex; justify-content:flex-end; gap:8px; padding:14px 20px; border-top:1px solid var(--border);}

/* ---------- SKU chips (pedido) ---------- */
.chip-list{display:flex; flex-wrap:wrap; gap:6px; margin-top:10px;}
.chip{font-family:'IBM Plex Mono'; font-size:11.5px; padding:4px 9px; border-radius:2px; border:1px solid var(--border);}
.chip.ok{background:var(--accent-soft); color:var(--accent-dark); border-color:#B9D6C9;}
.chip.bad{background:var(--warn-soft); color:var(--warn); border-color:#E3B7AA;}

.section-title{display:flex; align-items:center; gap:10px; margin-bottom:14px;}
.section-title h2{font-size:16px;}
.section-title .rule{flex:1; height:1px; background:var(--border-strong);}

.toast{position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:var(--ink); color:#fff; padding:10px 18px; border-radius:var(--radius); font-size:13px; box-shadow:var(--shadow); z-index:200; max-width:520px; text-align:center;}

.pedido-card{border:1px solid var(--border); border-radius:var(--radius); padding:14px 16px; margin-bottom:10px; cursor:pointer; background:var(--surface);}
.pedido-card:hover{border-color:var(--accent);}
.pedido-card .pc-head{display:flex; justify-content:space-between; align-items:center; font-family:'Oswald'; text-transform:uppercase; font-size:13px; letter-spacing:.03em;}
.pedido-card .pc-sub{font-size:12px; color:var(--ink-soft); margin-top:4px;}

.helper-text{font-size:12px; color:var(--ink-soft); margin-bottom:14px; line-height:1.5;}
</style>
</head>

  <div class="topbar">
    <div class="brand">

      <div class="brand-text">

</div>

<div id="modal-root"></div>

function buildSeedData(){
  let out = [];
  let idCounter = 1;
  SEED_ROWS.forEach(r=>{
    const [codigo,pais,projeto,skuRaw,marca,submarca,versao,embalagem,peso,distribuidor,startup] = r;
    const skus = skuRaw.includes('/') ? skuRaw.split('/').map(s=>s.trim()).filter(Boolean) : [skuRaw];
    skus.forEach(sku=>{
      out.push({
        id:'db_'+(idCounter++),
        codigo:(codigo||'').trim(),
        pais:(pais||'').trim(),
        projeto:(projeto||'').trim(),
        sku:sku.trim().toUpperCase(),
        marca:(marca||'').trim(),
        submarca:(submarca||'').trim(),
        versao:(versao||'').trim(),
        embalagem:(embalagem||'').trim(),
        peso:(peso||'').trim(),
        distribuidor:(distribuidor||'').trim(),
        startup:(startup||'').trim()
      });
    });
  });
  return out;
}

/* =========================================================================
   REGRAS DE NEGÓCIO — LOTE E VIGÊNCIA
   ========================================================================= */
function dayOfYear(d){
  const start = new Date(d.getFullYear(),0,1);
  return Math.floor((d - start) / 86400000) + 1;
}
function calcLote(dateStr){
  if(!dateStr) return '';
  const d = new Date(dateStr+'T00:00:00');
  if(isNaN(d.getTime())) return '';
  const year = String(d.getFullYear()).slice(-2);
  const doy = String(dayOfYear(d)).padStart(3,'0');
  return 'L'+year+doy;
}
// Lote do último dia antes de uma data de startup (usado quando já existe a próxima etiqueta agendada)
function calcLoteAntesDe(dateStr){
  if(!dateStr) return '';
  const d = new Date(dateStr+'T00:00:00');
  if(isNaN(d.getTime())) return '';
  d.setDate(d.getDate()-1);
  return calcLote(d.toISOString().slice(0,10));
}

function productKeyOf(r){
  return [r.marca,r.submarca,r.versao,r.embalagem,r.peso,r.sku].join('|').toUpperCase();
}

function groupProducts(){
  const map = new Map();
  baseData.forEach(r=>{
    const key = productKeyOf(r);
    if(!map.has(key)){
      map.set(key, {key, marca:r.marca, submarca:r.submarca, versao:r.versao, embalagem:r.embalagem, peso:r.peso, sku:r.sku, rows:[]});
    }
    map.get(key).rows.push(r);
  });
  return Array.from(map.values());
}

function productDisplayName(p){
  const parts = [p.marca, p.submarca!=='-'?p.submarca:'', p.versao, p.embalagem, p.peso].filter(Boolean);
  return parts.join(' · ');
}

// "Família" = mesmo SKU (produto) + país + distribuidor — é exatamente o nodeKey
function nodeKeyOf(productKey, pais, distribuidor){
  return productKey+'::'+pais+'::'+(distribuidor||'');
}

function autoNomeEtiqueta(row, distribuidor){
  const parts = [row.codigo, row.projeto, row.pais, row.marca, (row.submarca&&row.submarca!=='-')?row.submarca:'', row.versao, row.embalagem, row.peso, row.sku, distribuidor||''];
  return parts.filter(Boolean).join(' ');
}

// Regras de vigência:
// 1) Uma etiqueta está vigente se seu Startup for <= hoje.
// 2) Se há mais de uma etiqueta vigente possível na mesma família (mesmo SKU+país+distribuidor),
//    a de Startup mais recente (mais próximo de hoje, sem ultrapassar) é a vigente.
function computeFamilyStatus(nodeKey){
  const list = etiquetas
    .filter(e=>e.nodeKey===nodeKey && e.dataStartup)
    .slice()
    .sort((a,b)=> a.dataStartup.localeCompare(b.dataStartup));
  let vigente = null;
  for(const e of list){
    if(e.dataStartup <= TODAY) vigente = e; else break;
  }
  let next = null;
  if(vigente){
    next = list.find(e=> e.dataStartup > vigente.dataStartup) || null;
  } else if(list.length){
    next = list[0]; // todas futuras, nenhuma vigente ainda
  }
  return {list, vigente, next};
}

// Lote recomendado:
// 1) Se a etiqueta é a vigente e NÃO há próxima etiqueta agendada -> lote da semana (calculado a partir de hoje).
// 2) Se a etiqueta é a vigente e HÁ uma próxima etiqueta com startup futuro -> lote calculado um dia
//    antes do startup da próxima etiqueta (último lote possível ainda sob a etiqueta atual).
function loteRecomendado(e, status){
  if(!status.vigente || status.vigente.id !== e.id) return null;
  if(status.next) return calcLoteAntesDe(status.next.dataStartup);
  return calcLote(TODAY);
}

/* =========================================================================
   SINCRONIZAÇÃO AUTOMÁTICA: BASE DE DADOS -> ETIQUETAS
   O nome da etiqueta e a Data de Startup são sempre puxados automaticamente
   da Base de Dados (coluna "Startup"), sem necessidade de cadastro manual
   um a um. Isso roda automaticamente após qualquer importação de CSV/TSV,
   e pode ser disparado manualmente pelo botão "Atualizar vigências" depois
   de edições individuais na Base de Dados ou na aba Etiquetas.
   ========================================================================= */
function syncEtiquetasFromBaseData(){
  let created=0, updated=0, removed=0;
  const validAutoKeys = new Set();

  baseData.forEach(row=>{
    if(!row.startup || !row.startup.trim()) return;
    const startup = row.startup.trim();
    const productKey = productKeyOf(row);
    const nodeKey = nodeKeyOf(productKey, row.pais, row.distribuidor||null);
    const autoKey = nodeKey+'::'+row.codigo;
    validAutoKeys.add(autoKey);
    const nome = autoNomeEtiqueta(row, row.distribuidor);

    const existingAuto = etiquetas.find(e=> e.autoKey===autoKey);
    if(existingAuto){
      if(existingAuto.dataStartup!==startup || existingAuto.nomeEtiqueta!==nome || existingAuto.sku!==row.sku){
        existingAuto.dataStartup = startup;
        existingAuto.nomeEtiqueta = nome;
        existingAuto.sku = row.sku;
        updated++;
      }
      return;
    }
    // Se o usuário excluiu manualmente esta mesma versão (mesmo startup), respeita a exclusão.
    if(suppressedAuto[autoKey] === startup) return;
    if(suppressedAuto[autoKey] !== undefined && suppressedAuto[autoKey] !== startup){
      delete suppressedAuto[autoKey]; // dado mudou desde a exclusão: volta a gerar
    }
    etiquetas.push({
      id: uid('etq'), source:'auto', autoKey, nodeKey,
      productKey, sku: row.sku, pais: row.pais, distribuidor: row.distribuidor||null,
      nomeEtiqueta: nome, dataStartup: startup, observacoes:'',
      criadoEm: new Date().toISOString()
    });
    created++;
  });

  const before = etiquetas.length;
  etiquetas = etiquetas.filter(e=> e.source!=='auto' || validAutoKeys.has(e.autoKey));
  removed = before - etiquetas.length;

  return {created, updated, removed};
}

/* =========================================================================
   PARSER CSV/TSV (para importação da Base de Dados)
   ========================================================================= */
function parseDelimited(text){
  const delim = (text.split('\n')[0].split('\t').length > text.split('\n')[0].split(',').length) ? '\t' : ',';
  const rows = [];
  let i=0, field='', row=[], inQuotes=false;
  while(i < text.length){
    const c = text[i];
    if(inQuotes){
      if(c === '"'){
        if(text[i+1] === '"'){ field += '"'; i++; } else { inQuotes = false; }
      } else { field += c; }
    } else {
      if(c === '"'){ inQuotes = true; }
      else if(c === delim){ row.push(field); field=''; }
      else if(c === '\n' || c === '\r'){
        if(c === '\r' && text[i+1] === '\n') i++;
        row.push(field); field='';
        if(row.some(f=>f.trim()!=='')) rows.push(row);
        row = [];
      } else { field += c; }
    }
    i++;
  }
  if(field !== '' || row.length){ row.push(field); if(row.some(f=>f.trim()!=='')) rows.push(row); }
  return rows;
}

// Upsert: atualiza registros que mudaram, adiciona os novos e MANTÉM intactos
// os que já existiam e não mudaram (chave de identidade = Código + Projeto + SKU).
function importRowsToDatabase(rows){
  let start = 0;
  if(rows.length && /c[oó]digo/i.test(rows[0][0]||'')) start = 1;
  let added=0, updated=0, unchanged=0;
  const idBase = Date.now();
  let idCounter = 0;

  for(let r=start; r<rows.length; r++){
    const cols = rows[r];
    if(!cols || cols.every(c=>!c || !c.trim())) continue;
    const [codigo,pais,projeto,skuRaw,marca,submarca,versao,embalagem,peso,distribuidor,startup] = cols.map(c=>(c||'').replace(/\s+/g,' ').trim());
    if(!skuRaw) continue;
    const skus = skuRaw.includes('/') ? skuRaw.split('/').map(s=>s.trim()).filter(Boolean) : [skuRaw];
    skus.forEach(sku=>{
      const skuU = sku.toUpperCase();
      const newVals = {codigo:codigo||'', pais:pais||'', projeto:projeto||'', sku:skuU, marca:marca||'', submarca:submarca||'', versao:versao||'', embalagem:embalagem||'', peso:peso||'', distribuidor:distribuidor||'', startup:startup||''};
      const existing = baseData.find(k=> k.codigo===newVals.codigo && k.projeto===newVals.projeto && k.sku===newVals.sku);
      if(existing){
        const changed = Object.keys(newVals).some(k=> (existing[k]||'') !== (newVals[k]||''));
        if(changed){ Object.assign(existing, newVals); updated++; } else { unchanged++; }
      } else {
        baseData.push({id:'db_'+idBase+'_'+(idCounter++)+'_'+Math.random().toString(36).slice(2,6), ...newVals});
        added++;
      }
    });
  }
  return {added, updated, unchanged};
}

      <div class="field"><label>Marca</label><input id="f-marca" value="${escapeHtml(r.marca)}"></div>
    </div>
    <div class="field-row">
      <div class="field"><label>Submarca</label><input id="f-submarca" value="${escapeHtml(r.submarca)}"></div>
      <div class="field"><label>Versão</label><input id="f-versao" value="${escapeHtml(r.versao)}"></div>
    </div>
    <div class="field-row">
      <div class="field"><label>Embalagem</label><input id="f-embalagem" value="${escapeHtml(r.embalagem)}"></div>

        <input type="date" id="f-startup" value="${escapeHtml(r.startup)}">

      </div>

function openDbRowModal(id){
  const row = id ? baseData.find(r=>r.id===id) : null;
  openModal({
    title: row ? 'Editar registro' : 'Novo registro',
    bodyHtml: dbRowFormHtml(row),
    footHtml: `
      ${row ? '<button class="btn warn small" id="modal-delete">Excluir</button>' : ''}
      <button class="btn secondary" id="modal-cancel">Cancelar</button>
      <button class="btn" id="modal-save">Salvar</button>
    `,
    onMount:()=>{
      $('#modal-cancel').onclick = closeModal;
      $('#modal-save').onclick = async ()=>{
        const data = {
          codigo:$('#f-codigo').value.trim(), pais:$('#f-pais').value.trim(), projeto:$('#f-projeto').value.trim(),
          sku:$('#f-sku').value.trim().toUpperCase(), marca:$('#f-marca').value.trim(), submarca:$('#f-submarca').value.trim(),
          versao:$('#f-versao').value.trim(), embalagem:$('#f-embalagem').value.trim(), peso:$('#f-peso').value.trim(),
          distribuidor:$('#f-distribuidor').value.trim(), startup:$('#f-startup').value.trim()
        };
        if(!data.sku){ toast('Informe o SKU.'); return; }
        if(row){
          Object.assign(row, data);
        } else {
          const skus = data.sku.includes('/') ? data.sku.split('/').map(s=>s.trim()).filter(Boolean) : [data.sku];
          skus.forEach(sku=> baseData.push({id:uid('db'), ...data, sku}));
        }
        await saveBaseData();
        closeModal(); render();
        toast('Registro salvo. Clique em "Atualizar vigências" na aba Etiquetas para refletir esta mudança nas etiquetas.');
      };
      if(row){
        $('#modal-delete').onclick = async ()=>{
          if(!confirm('Excluir este registro da base de dados?')) return;
          baseData = baseData.filter(r=>r.id!==row.id);
          await saveBaseData();
          closeModal(); render();
          toast('Registro excluído. Clique em "Atualizar vigências" para remover etiquetas geradas a partir dele.');
        };
      }
    }
  });
}

/* =========================================================================
   RENDER: ABA ETIQUETAS (drill-down)
   ========================================================================= */
function renderCrumbs(){
  const items = [{label:'Produtos', level:1}];
  if(etiquetaNav.productKey){
    const p = groupProducts().find(g=>g.key===etiquetaNav.productKey);
    items.push({label: p ? productDisplayName(p) : 'Produto', level:2});
  }
  if(etiquetaNav.pais){
    items.push({label: etiquetaNav.pais, level:3});
  }
  if(etiquetaNav.level===4){
    items.push({label: etiquetaNav.distribuidor || 'Etiqueta', level:4});
  }
  return `<div class="crumbs">${items.map((it,idx)=>`
    ${idx>0?'<span class="crumb-sep">›</span>':''}
    <span class="crumb ${idx===items.length-1?'active':''}">
      <button class="crumb-btn" data-crumb="${it.level}">${escapeHtml(it.label)}</button>
    </span>
  `).join('')}</div>`;
}

function renderEtiquetasTab(){
  let body = '';
  if(etiquetaNav.level===1) body = renderLevel1();
  else if(etiquetaNav.level===2) body = renderLevel2();
  else if(etiquetaNav.level===3) body = renderLevel3();
  else if(etiquetaNav.level===4) body = renderLevel4();
  return `
    <div class="panel">
      <div class="section-title">
        <h2>Etiquetas</h2>
        <div class="rule"></div>
        <button class="btn secondary small" id="btn-sync-etiquetas-top">↻ Atualizar vigências</button>
      </div>
      <p class="helper-text">Selecione produto → país → distribuidor para ver a etiqueta e o lote recomendado. Nome e Startup são puxados automaticamente da Base de Dados; use "Atualizar vigências" depois de editar a Base de Dados manualmente ou editar uma etiqueta aqui.</p>
      ${renderCrumbs()}${body}
    </div>
  `;
}

function renderLevel1(){
  const products = groupProducts();
  if(!products.length){
    return `<div class="empty-state"><h3>Nenhum produto na base</h3><p>Importe ou cadastre registros na aba Base de Dados para começar a criar etiquetas.</p></div>`;
  }
  return `<div class="grid">${products.map(p=>{
    const countries = new Set(p.rows.map(r=>r.pais)).size;
    return `<button class="pick-card" data-pick-product="${p.key}">
      <div class="pc-eyebrow">SKU ${escapeHtml(p.sku)}</div>
      <div class="pc-title">${escapeHtml(productDisplayName(p))}</div>
      <div class="pc-meta"><span class="tag blue">${countries} país${countries!==1?'es':''}</span></div>
    </button>`;
  }).join('')}</div>`;
}

function renderLevel2(){
  const p = groupProducts().find(g=>g.key===etiquetaNav.productKey);
  if(!p) return `<div class="empty-state"><h3>Produto não encontrado</h3></div>`;
  const countryMap = new Map();
  p.rows.forEach(r=>{
    if(!countryMap.has(r.pais)) countryMap.set(r.pais, []);
    countryMap.get(r.pais).push(r);
  });
  const countries = Array.from(countryMap.entries());
  return `<div class="grid">${countries.map(([pais, rows])=>{
    const dists = new Set(rows.map(r=>r.distribuidor).filter(Boolean));
    return `<button class="pick-card" data-pick-pais="${escapeHtml(pais)}">
      <div class="pc-eyebrow">País</div>
      <div class="pc-title">${escapeHtml(pais)}</div>
      <div class="pc-meta">${dists.size ? `<span class="tag accent">${dists.size} distribuidor${dists.size!==1?'es':''}</span>` : `<span class="tag">Sem distribuidor</span>`}</div>
    </button>`;
  }).join('')}</div>`;
}

function renderLevel3(){
  const p = groupProducts().find(g=>g.key===etiquetaNav.productKey);
  if(!p) return `<div class="empty-state"><h3>Produto não encontrado</h3></div>`;
  const rows = p.rows.filter(r=>r.pais===etiquetaNav.pais);
  const dists = Array.from(new Set(rows.map(r=>r.distribuidor).filter(d=>d && d.trim())));
  if(!dists.length){
    etiquetaNav.level = 4; etiquetaNav.distribuidor = null;
    return renderLevel4();
  }
  return `<div class="grid">${dists.map(d=>`
    <button class="pick-card" data-pick-dist="${escapeHtml(d)}">
      <div class="pc-eyebrow">Distribuidor</div>
      <div class="pc-title">${escapeHtml(d)}</div>
    </button>
  `).join('')}</div>`;
}

function renderLevel4(){
  const p = groupProducts().find(g=>g.key===etiquetaNav.productKey);
  if(!p) return `<div class="empty-state"><h3>Produto não encontrado</h3></div>`;
  const nodeKey = nodeKeyOf(etiquetaNav.productKey, etiquetaNav.pais, etiquetaNav.distribuidor);
  const status = computeFamilyStatus(nodeKey);
  const { list, vigente } = status;

  let html = `
    <div class="section-title">
      <h2>${escapeHtml(productDisplayName(p))} · SKU ${escapeHtml(p.sku)}</h2>
      <div class="rule"></div>
      <button class="btn small" id="btn-nova-etiqueta">+ Nova etiqueta manual</button>
    </div>
  `;

  if(!list.length){
    html += `<div class="empty-state"><h3>Nenhuma etiqueta cadastrada</h3><p>Preencha a Data de Startup na Base de Dados para este produto/país${etiquetaNav.distribuidor?'/distribuidor':''} e clique em "Atualizar vigências" acima — a etiqueta é gerada automaticamente. Também é possível criar uma etiqueta manual.</p></div>`;
    return html;
  }

  if(vigente) html += renderEtiquetaCard(vigente, status, true);

  const historico = list.filter(e=> e!==vigente).sort((a,b)=> b.dataStartup.localeCompare(a.dataStartup));
  if(historico.length){
    html += `<h4 style="margin:18px 0 10px; font-size:12px; color:var(--ink-faint);">${vigente ? 'Outras etiquetas (histórico e programadas)' : 'Etiquetas programadas'}</h4>`;
    historico.forEach(e=> html += renderEtiquetaCard(e, status, false));
  }

  return html;
}

function renderEtiquetaCard(e, status, isActive){
  const lote = loteRecomendado(e, status);
  const isFuture = e.dataStartup > TODAY;
  const statusLabel = isActive ? 'Vigente' : (isFuture ? 'Programada' : 'Histórico');
  return `
    <div class="etiqueta-final ${isActive?'':'inactive'}">
      <div class="ef-top">
        <div class="ef-name">${escapeHtml(e.nomeEtiqueta)}</div>
        <div class="ef-status ${isActive?'on':'off'}">${statusLabel}</div>
      </div>
      ${lote ? `<div class="stamp"><small>Lote recomendado</small>${escapeHtml(lote)}</div>` : ''}
      <div class="ef-row">
        <div><b>Data Startup</b>${escapeHtml(e.dataStartup||'—')}</div>
        <div><b>País</b>${escapeHtml(e.pais)}</div>
        <div><b>Distribuidor</b>${escapeHtml(e.distribuidor||'—')}</div>
        <div><b>SKU</b>${escapeHtml(e.sku)}</div>
        <div><b>Origem</b>${e.source==='auto' ? 'Automática (Base de Dados)' : 'Manual'}</div>
      </div>
      ${(isActive && status.next) ? `<div class="field-hint" style="margin-top:10px;">Próxima etiqueta programada para ${escapeHtml(status.next.dataStartup)} (${escapeHtml(status.next.nomeEtiqueta)}). O lote recomendado acima já considera o corte um dia antes desse startup.</div>` : ''}
      ${e.observacoes ? `<div class="ef-obs">"${escapeHtml(e.observacoes)}"</div>` : ''}
      <div class="ef-actions">
        <button class="btn secondary small btn-edit-etiqueta" data-id="${e.id}">Editar</button>
        <button class="btn warn small btn-delete-etiqueta" data-id="${e.id}">Excluir</button>
      </div>
    </div>
  `;
}

function findMatchingBaseRows(){
  const p = groupProducts().find(g=>g.key===etiquetaNav.productKey);
  if(!p) return [];
  return p.rows.filter(r=>{
    if(r.pais !== etiquetaNav.pais) return false;
    const rd = (r.distribuidor||'').trim();
    if(etiquetaNav.distribuidor) return rd === etiquetaNav.distribuidor;
    return !rd;
  });
}

function openEtiquetaModal(existing){
  const sourceRows = findMatchingBaseRows();
  const uniqueSources = [];
  const seen = new Set();
  sourceRows.forEach(r=>{
    const k = r.codigo+'|'+r.projeto;
    if(!seen.has(k)){ seen.add(k); uniqueSources.push(r); }
  });
  let chosenSource = uniqueSources[0] || null;
  const defaultStartup = existing ? existing.dataStartup : (chosenSource && chosenSource.startup ? chosenSource.startup : '');

  const bodyHtml = `
    ${(!existing && uniqueSources.length>1) ? `
      <div class="field">
        <label>Registro de origem (Código Webcenter / Projeto)</label>
        <select id="f-source">
          ${uniqueSources.map((r,i)=>`<option value="${i}">${escapeHtml(r.codigo)} — ${escapeHtml(r.projeto)}${r.startup? ' (startup: '+escapeHtml(r.startup)+')' : ''}</option>`).join('')}
        </select>
        <div class="field-hint">Vários registros da base correspondem a este produto/país/distribuidor. Escolha qual usar para preencher o nome e o startup automaticamente.</div>
      </div>
    ` : ''}
    <div class="field">
      <label>Nome da Etiqueta</label>
      <input id="f-nome-etiqueta" value="${escapeHtml(existing ? existing.nomeEtiqueta : (chosenSource ? autoNomeEtiqueta(chosenSource, etiquetaNav.distribuidor) : ''))}">
      <div class="field-hint">Preenchido automaticamente (Código+Projeto+País+Marca+Submarca+Versão+Embalagem+Peso+SKU+Distribuidor). Pode editar livremente.</div>
    </div>
    <div class="field">
      <label>Data Startup</label>
      <input type="date" id="f-data-startup" value="${escapeHtml(defaultStartup)}">
      <div class="field-hint">Puxada automaticamente da Base de Dados quando disponível. Pode ajustar se necessário.</div>
    </div>
    <div class="field">
      <label>Observações</label>
      <textarea id="f-obs" rows="3">${escapeHtml(existing ? existing.observacoes : '')}</textarea>
    </div>
  `;

  openModal({
    title: existing ? 'Editar etiqueta' : 'Nova etiqueta manual',
    bodyHtml,
    footHtml: `<button class="btn secondary" id="modal-cancel">Cancelar</button><button class="btn" id="modal-save">Salvar</button>`,
    onMount:()=>{
      $('#modal-cancel').onclick = closeModal;
      if(!existing && uniqueSources.length>1){
        $('#f-source').onchange = (ev)=>{
          chosenSource = uniqueSources[parseInt(ev.target.value,10)];
          $('#f-nome-etiqueta').value = autoNomeEtiqueta(chosenSource, etiquetaNav.distribuidor);
          if(chosenSource.startup) $('#f-data-startup').value = chosenSource.startup;
        };
      }
      $('#modal-save').onclick = async ()=>{
        const nome = $('#f-nome-etiqueta').value.trim();
        const dataStartup = $('#f-data-startup').value;
        if(!nome){ toast('Informe o nome da etiqueta.'); return; }
        if(!dataStartup){ toast('Informe a Data Startup.'); return; }
        if(!existing && totalRecords() >= 999){ toast('Limite de 999 registros atingido.'); return; }
        const p = groupProducts().find(g=>g.key===etiquetaNav.productKey);
        const nodeKey = nodeKeyOf(etiquetaNav.productKey, etiquetaNav.pais, etiquetaNav.distribuidor);
        if(existing){
          existing.nomeEtiqueta = nome;
          existing.dataStartup = dataStartup;
          existing.observacoes = $('#f-obs').value.trim();
        } else {
          etiquetas.push({
            id: uid('etq'), source:'manual', nodeKey,
            productKey: etiquetaNav.productKey, sku: p.sku, pais: etiquetaNav.pais,
            distribuidor: etiquetaNav.distribuidor || null,
            nomeEtiqueta: nome, dataStartup, observacoes: $('#f-obs').value.trim(),
            criadoEm: new Date().toISOString()
          });
        }
        await saveEtiquetas();
        closeModal(); render();
        toast('Etiqueta salva.');
      };
    }
  });
}

/* =========================================================================
   RENDER: ABA PEDIDOS
   ========================================================================= */
function parseSkuPaste(text){
  return Array.from(new Set(
    text.split(/[\n\r\t,;]+/).map(s=>s.trim().toUpperCase()).filter(Boolean)
  ));
}

function renderPedidosTab(){
  if(pedidosView.mode==='detail'){
    return renderPedidoDetail();
  }
  const sorted = [...pedidos].sort((a,b)=> (b.data||'').localeCompare(a.data||''));
  return `
    <div class="panel">
      <div class="toolbar">
        <div class="toolbar-left"><span class="count-pill">${pedidos.length} pedido${pedidos.length!==1?'s':''}</span></div>
        <button class="btn small" id="btn-novo-pedido">+ Novo pedido</button>
      </div>
      ${sorted.length===0 ? `<div class="empty-state"><h3>Nenhum pedido cadastrado</h3><p>Crie um pedido para consultar automaticamente a etiqueta e o lote vigentes de cada SKU.</p></div>` :
        sorted.map(p=>`
        <div class="pedido-card" data-open-pedido="${p.id}">
          <div class="pc-head"><span>Pedido ${escapeHtml(p.numero)}</span><span class="mono" style="font-size:11.5px; color:var(--ink-soft); text-transform:none;">${escapeHtml(p.data)}</span></div>
          <div class="pc-sub">${escapeHtml(p.pais)}${p.distribuidor?' · '+escapeHtml(p.distribuidor):''} · ${p.skus.length} SKU${p.skus.length!==1?'s':''}</div>
        </div>
      `).join('')}
    </div>
  `;
}

function renderPedidoDetail(){
  const p = pedidos.find(x=>x.id===pedidosView.pedidoId);
  if(!p){ pedidosView.mode='list'; return renderPedidosTab(); }
  const rows = p.skus.map(sku=>{
    const baseRow = baseData.find(r=>r.sku===sku && r.pais===p.pais && ((r.distribuidor||'')===(p.distribuidor||'')));
    let etiquetaVigente = null;
    if(baseRow){
      const productKey = productKeyOf(baseRow);
      const nodeKey = nodeKeyOf(productKey, p.pais, p.distribuidor || null);
      const status = computeFamilyStatus(nodeKey);
      // etiqueta vigente na data do pedido (não necessariamente hoje)
      const candidates = status.list.filter(e=> e.dataStartup <= p.data);
      candidates.sort((a,b)=> b.dataStartup.localeCompare(a.dataStartup));
      etiquetaVigente = candidates[0] || null;
      const next = status.list.find(e=> etiquetaVigente && e.dataStartup > etiquetaVigente.dataStartup) || null;
      if(etiquetaVigente) etiquetaVigente = {...etiquetaVigente, _next: next};
    }
    return {sku, baseRow, etiquetaVigente};
  });

  return `
    <div class="panel">
      <div class="crumbs">
        <span class="crumb"><button class="crumb-btn" id="btn-back-pedidos">Pedidos</button></span>
        <span class="crumb-sep">›</span>
        <span class="crumb active">${escapeHtml(p.numero)}</span>
      </div>
      <div class="section-title"><h2>Pedido ${escapeHtml(p.numero)}</h2><div class="rule"></div>
        <button class="btn warn small" id="btn-delete-pedido" data-id="${p.id}">Excluir pedido</button>
      </div>
      <div class="ef-row" style="margin-bottom:18px;">
        <div><b>Data do Pedido</b>${escapeHtml(p.data)}</div>
        <div><b>País</b>${escapeHtml(p.pais)}</div>
        <div><b>Distribuidor</b>${escapeHtml(p.distribuidor||'—')}</div>
      </div>
      <h4 style="font-size:12px; color:var(--ink-faint); margin-bottom:10px;">Itens do pedido</h4>
      ${rows.map(r=>{
        const lote = r.etiquetaVigente ? (r.etiquetaVigente._next ? calcLoteAntesDe(r.etiquetaVigente._next.dataStartup) : calcLote(p.data)) : '';
        return `
        <div class="etiqueta-final" style="margin-bottom:10px;">
          <div class="ef-top">
            <div class="ef-name mono" style="font-size:14px;">${escapeHtml(r.sku)}</div>
            ${!r.baseRow ? `<div class="ef-status off">SKU não encontrado na base</div>` : (r.etiquetaVigente ? `<div class="ef-status on">Etiqueta vigente</div>` : `<div class="ef-status off">Sem etiqueta vigente</div>`)}
          </div>
          ${r.baseRow ? `<div class="ef-row"><div><b>Produto</b>${escapeHtml(r.baseRow.marca)} ${escapeHtml(r.baseRow.versao)} · ${escapeHtml(r.baseRow.embalagem)} ${escapeHtml(r.baseRow.peso)}</div></div>` : ''}
          ${r.etiquetaVigente ? `
            <div style="margin-top:10px; font-family:'Oswald'; text-transform:uppercase; font-size:13px;">${escapeHtml(r.etiquetaVigente.nomeEtiqueta)}</div>
            <div class="stamp" style="margin-top:8px;"><small>Lote recomendado</small>${escapeHtml(lote)}</div>
          ` : (r.baseRow ? `<p class="field-hint" style="margin-top:8px;">Nenhuma etiqueta com Data Startup até ${escapeHtml(p.data)} foi encontrada para este SKU/país/distribuidor. Cadastre a Data de Startup na Base de Dados e clique em "Atualizar vigências" na aba Etiquetas.</p>` : '')}
        </div>
      `;}).join('')}
    </div>
  `;
}

function openPedidoModal(){
  const paises = Array.from(new Set(baseData.map(r=>r.pais).filter(Boolean))).sort();
  const bodyHtml = `
    <div class="field-row">
      <div class="field"><label>Nº Pedido</label><input id="f-numero"></div>
      <div class="field"><label>Data</label><input type="date" id="f-data" value="${new Date().toISOString().slice(0,10)}"></div>
    </div>
    <div class="field-row">
      <div class="field">
        <label>País</label>
        <select id="f-pais"><option value="">Selecione...</option>${paises.map(p=>`<option value="${escapeHtml(p)}">${escapeHtml(p)}</option>`).join('')}</select>
        <div class="field-hint">Lista vem diretamente da coluna País na Base de Dados.</div>
      </div>
      <div class="field">
        <label>Distribuidor (opcional)</label>
        <select id="f-distribuidor"><option value="">Nenhum</option></select>
        <div class="field-hint">Vem da coluna Distribuidor, filtrada pelo país selecionado.</div>
      </div>
    </div>
    <div class="field">
      <label>SKUs</label>
      <textarea id="f-skus" rows="5" placeholder="Cole ou digite os SKUs — um por linha, ou separados por vírgula/tab (ex: colar de uma planilha)"></textarea>
      <div class="field-hint">Aceita colar múltiplos valores copiados de uma tabela — cada linha/célula vira um SKU.</div>
      <div class="chip-list" id="sku-chips"></div>
    </div>
  `;
  openModal({
    title:'Novo pedido',
    bodyHtml,
    footHtml:`<button class="btn secondary" id="modal-cancel">Cancelar</button><button class="btn" id="modal-save">Criar pedido</button>`,
    onMount:()=>{
      $('#modal-cancel').onclick = closeModal;
      $('#f-pais').onchange = ()=>{
        const pais = $('#f-pais').value;
        const dists = Array.from(new Set(baseData.filter(r=>r.pais===pais).map(r=>r.distribuidor).filter(d=>d && d.trim())));
        $('#f-distribuidor').innerHTML = `<option value="">Nenhum</option>` + dists.map(d=>`<option value="${escapeHtml(d)}">${escapeHtml(d)}</option>`).join('');
      };
      const updateChips = ()=>{
        const skus = parseSkuPaste($('#f-skus').value);
        const box = $('#sku-chips');
        box.innerHTML = skus.map(s=>{
          const found = baseData.some(r=>r.sku===s);
          return `<span class="chip ${found?'ok':'bad'}">${escapeHtml(s)}${found?'':' ⚠'}</span>`;
        }).join('');
      };
      $('#f-skus').addEventListener('input', updateChips);
      $('#f-skus').addEventListener('paste', ()=> setTimeout(updateChips, 0));
      $('#modal-save').onclick = async ()=>{
        const numero = $('#f-numero').value.trim();
        const data = $('#f-data').value;
        const pais = $('#f-pais').value;
        const distribuidor = $('#f-distribuidor').value;
        const skus = parseSkuPaste($('#f-skus').value);
        if(!numero){ toast('Informe o número do pedido.'); return; }
        if(!data){ toast('Informe a data do pedido.'); return; }
        if(!pais){ toast('Selecione o país.'); return; }
        if(!skus.length){ toast('Informe ao menos um SKU.'); return; }
        if(totalRecords() >= 999){ toast('Limite de 999 registros atingido.'); return; }
        pedidos.push({id:uid('ped'), type:'pedido', numero, data, pais, distribuidor: distribuidor||null, skus, criadoEm:new Date().toISOString()});
        await savePedidos();
        closeModal();
        pedidosView = {mode:'list', pedidoId:null};
        render();
        toast('Pedido criado.');
      };
    }
  });
}

/* =========================================================================
   MODAL GENÉRICO
   ========================================================================= */
function openModal({title, bodyHtml, footHtml, onMount}){
  const root = $('#modal-root');
  root.innerHTML = `
    <div class="modal-backdrop" id="modal-backdrop">
      <div class="modal">
        <div class="modal-head"><h3>${escapeHtml(title)}</h3><button class="modal-close" id="modal-x">&times;</button></div>
        <div class="modal-body">${bodyHtml}</div>
        <div class="modal-foot">${footHtml}</div>
      </div>
    </div>
  `;
  $('#modal-x').onclick = closeModal;
  $('#modal-backdrop').addEventListener('click', (e)=>{ if(e.target.id==='modal-backdrop') closeModal(); });
  if(onMount) onMount();
}
function closeModal(){ $('#modal-root').innerHTML = ''; }

/* =========================================================================
   RENDER PRINCIPAL + EVENTOS
   ========================================================================= */
function render(){
  $('#record-count').textContent = totalRecords();
  $$('.tab-btn').forEach(b=> b.classList.toggle('active', b.dataset.tab===activeTab));
  const content = $('#tab-content');
  if(activeTab==='db') content.innerHTML = renderDbTab();
  else if(activeTab==='etiquetas') content.innerHTML = renderEtiquetasTab();
  else if(activeTab==='pedidos') content.innerHTML = renderPedidosTab();
  bindTabEvents();
}

async function runSync(showToast){
  const r = syncEtiquetasFromBaseData();
  await saveEtiquetas();
  await saveSuppressed();
  render();
  if(showToast) toast(`Vigências atualizadas: ${r.created} nova(s), ${r.updated} atualizada(s), ${r.removed} removida(s).`);
  return r;
}

function bindTabEvents(){
  if(activeTab==='db'){
    const search = $('#db-search');
    if(search){
      search.oninput = ()=>{ dbFilter = search.value; render(); search.focus(); search.setSelectionRange(search.value.length, search.value.length); };
    }
    const addBtn = $('#btn-add-row'); if(addBtn) addBtn.onclick = ()=> openDbRowModal(null);
    $$('.btn-edit-row').forEach(b=> b.onclick = ()=> openDbRowModal(b.dataset.id));
    const importBtn = $('#btn-import-csv');
    const fileInput = $('#file-import');
    if(importBtn) importBtn.onclick = ()=> fileInput.click();
    if(fileInput) fileInput.onchange = async (e)=>{
      const file = e.target.files[0];
      if(!file) return;
      const text = await file.text();
      const rows = parseDelimited(text);
      const r = importRowsToDatabase(rows);
      await saveBaseData();
      const s = syncEtiquetasFromBaseData();
      await saveEtiquetas();
      await saveSuppressed();
      fileInput.value = '';
      render();
      toast(`Base: ${r.added} novo(s), ${r.updated} atualizado(s), ${r.unchanged} sem alteração. Etiquetas: ${s.created} nova(s), ${s.updated} atualizada(s), ${s.removed} removida(s).`);
    };
  }
  if(activeTab==='etiquetas'){
    const syncTopBtn = $('#btn-sync-etiquetas-top'); if(syncTopBtn) syncTopBtn.onclick = ()=> runSync(true);
    $$('[data-pick-product]').forEach(el=> el.onclick = ()=>{
      etiquetaNav = {level:2, productKey:el.dataset.pickProduct, pais:null, distribuidor:null};
      render();
    });
    $$('[data-pick-pais]').forEach(el=> el.onclick = ()=>{
      const p = groupProducts().find(g=>g.key===etiquetaNav.productKey);
      const rows = p.rows.filter(r=>r.pais===el.dataset.pickPais);
      const hasDist = rows.some(r=> r.distribuidor && r.distribuidor.trim());
      etiquetaNav.pais = el.dataset.pickPais;
      etiquetaNav.distribuidor = null;
      etiquetaNav.level = hasDist ? 3 : 4;
      render();
    });
    $$('[data-pick-dist]').forEach(el=> el.onclick = ()=>{
      etiquetaNav.distribuidor = el.dataset.pickDist;
      etiquetaNav.level = 4;
      render();
    });
    $$('[data-crumb]').forEach(el=> el.onclick = ()=>{
      const lvl = parseInt(el.dataset.crumb,10);
      if(lvl===1) etiquetaNav = {level:1, productKey:null, pais:null, distribuidor:null};
      else if(lvl===2){ etiquetaNav.level=2; etiquetaNav.pais=null; etiquetaNav.distribuidor=null; }
      else if(lvl===3){ etiquetaNav.level=3; etiquetaNav.distribuidor=null; }
      render();
    });
    const novaBtn = $('#btn-nova-etiqueta'); if(novaBtn) novaBtn.onclick = ()=> openEtiquetaModal(null);
    $$('.btn-edit-etiqueta').forEach(b=> b.onclick = ()=>{
      const e = etiquetas.find(x=>x.id===b.dataset.id);
      openEtiquetaModal(e);
    });
    $$('.btn-delete-etiqueta').forEach(b=> b.onclick = async ()=>{
      if(!confirm('Excluir esta etiqueta?')) return;
      const e = etiquetas.find(x=>x.id===b.dataset.id);
      if(e && e.source==='auto' && e.autoKey){
        suppressedAuto[e.autoKey] = e.dataStartup;
        await saveSuppressed();
      }
      etiquetas = etiquetas.filter(x=>x.id!==b.dataset.id);
      await saveEtiquetas(); render(); toast('Etiqueta excluída.');
    });
  }
  if(activeTab==='pedidos'){
    const novoBtn = $('#btn-novo-pedido'); if(novoBtn) novoBtn.onclick = openPedidoModal;
    $$('[data-open-pedido]').forEach(el=> el.onclick = ()=>{
      pedidosView = {mode:'detail', pedidoId: el.dataset.openPedido};
      render();
    });
    const backBtn = $('#btn-back-pedidos'); if(backBtn) backBtn.onclick = ()=>{ pedidosView = {mode:'list', pedidoId:null}; render(); };
    const delPedBtn = $('#btn-delete-pedido');
    if(delPedBtn) delPedBtn.onclick = async ()=>{
      if(!confirm('Excluir este pedido?')) return;
      pedidos = pedidos.filter(p=>p.id!==delPedBtn.dataset.id);
      await savePedidos();
      pedidosView = {mode:'list', pedidoId:null};
      render();
      toast('Pedido excluído.');
    };
  }
}

$$('.tab-btn').forEach(b=> b.onclick = ()=>{ activeTab = b.dataset.tab; render(); });

$('#btn-excluir-tudo').onclick = async ()=>{
  if(totalRecords()===0){ toast('Não há etiquetas ou pedidos para excluir.'); return; }
  if(!confirm('Isso vai excluir TODAS as etiquetas e TODOS os pedidos (a Base de Dados não será afetada). Confirmar?')) return;
  etiquetas = [];
  pedidos = [];
  suppressedAuto = {};
  await saveEtiquetas();
  await savePedidos();
  await saveSuppressed();
  pedidosView = {mode:'list', pedidoId:null};
  etiquetaNav = {level:1, productKey:null, pais:null, distribuidor:null};
  render();
  toast('Etiquetas e pedidos excluídos.');
};

async function boot(){
  await loadAll();
  await runSync(false); // gera automaticamente as etiquetas a partir da Base de Dados ao entrar
  render();
}

boot();
</script>
  </body>
</html>
