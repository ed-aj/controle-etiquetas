<!DOCTYPE html>
<html>
<head>
  <title>Login</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
    }

    .card {
      background: rgba(255, 255, 255, 0.08);
      padding: 40px;
      border-radius: 16px;
      width: 320px;
      backdrop-filter: blur(10px);
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
      font-weight: 600;
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 8px 0;
      border: none;
      border-radius: 10px;
      outline: none;
      font-size: 14px;
    }

    input:focus {
      outline: 2px solid #3b82f6;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-size: 14px;
      font-weight: bold;
      transition: 0.2s;
    }

    .login-btn {
      background: #3b82f6;
      color: white;
    }

    .login-btn:hover {
      background: #2563eb;
    }

    .signup-btn {
      background: transparent;
      border: 1px solid #64748b;
      color: white;
    }

    .signup-btn:hover {
      background: rgba(255,255,255,0.1);
    }

    #status {
      margin-top: 10px;
      font-size: 12px;
      text-align: center;
      color: #cbd5e1;
    }
  </style>
</head>

<body>

  <div class="card">

    <h2>Bem-vindo</h2>

    <input id="email" placeholder="Email">
    <input id="senha" type="password" placeholder="Senha">

    <button class="login-btn" onclick="login()">Entrar</button>
    <button class="signup-btn" onclick="cadastro()">Cadastrar</button>

    <p id="status"></p>

  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
    import { 
      getAuth, 
      createUserWithEmailAndPassword, 
      signInWithEmailAndPassword 
    } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCTJyf-S1SFIQIG5l6y_EV06-dqnc6SxsQ",
      authDomain: "controle-de-etiquetas-d8385.firebaseapp.com",
      projectId: "controle-de-etiquetas-d8385",
      storageBucket: "controle-de-etiquetas-d8385.firebasestorage.app",
      messagingSenderId: "269761879207",
      appId: "1:269761879207:web:653a30302ddef6c27dcf82"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    window.cadastro = function () {
      const email = document.getElementById("email").value;
      const senha = document.getElementById("senha").value;

      createUserWithEmailAndPassword(auth, email, senha)
        .then(() => {
          document.getElementById("status").innerText = "Conta criada com sucesso!";
        })
        .catch((error) => {
          document.getElementById("status").innerText = error.message;
        });
    }

    window.login = function () {
      const email = document.getElementById("email").value;
      const senha = document.getElementById("senha").value;

      signInWithEmailAndPassword(auth, email, senha)
        .then(() => {
          document.getElementById("status").innerText = "Login OK!";
          window.location.href = "index.html";
        })
        .catch((error) => {
          document.getElementById("status").innerText = error.message;
        });
    }
  </script>

</body>
</html>
