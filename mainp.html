<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
import {
  getAuth,
  onAuthStateChanged,
  signOut
} from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";
import {
  getFirestore,
  doc,
  getDoc,
  setDoc
} from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCTJyf-S1SFIQIG5l6y_EV06-dqnc6SxsQ",
  authDomain: "controle-de-etiquetas-d8385.firebaseapp.com",
  projectId: "controle-de-etiquetas-d8385",
  storageBucket: "controle-de-etiquetas-d8385.firebasestorage.app",
  messagingSenderId: "269761879207",
  appId: "1:269761879207:web:653a30302ddef6c27dcf82"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// Agrupadas num único objeto (em vez de duas funções soltas em window) para
// reduzir a superfície exposta no escopo global.
window.__appBackend = {
  get: async function(key){
    const snap = await getDoc(doc(db, 'appData', key));
    return snap.exists() ? snap.data().payload : null;
  },
  set: async function(key, value){
    await setDoc(doc(db, 'appData', key), {
      payload: value,
      atualizadoEm: new Date().toISOString()
    });
    return true;
  }
};

onAuthStateChanged(auth, (user) => {
  if (!user) {
    window.location.replace("index.html");
    return;
  }
  document.body.classList.remove('auth-pending');
  window.dispatchEvent(new Event('app:authenticated'));
});

window.logout = function(){
  signOut(auth)
    .then(() => {
      window.location.replace("index.html");
    })
    .catch((error)=>{
      console.error(error);
    });
};
</script>
<script>
// Defesa contra Clickjacking: como o GitHub Pages não permite configurar o
// cabeçalho HTTP X-Frame-Options (e o CSP acima, por vir via <meta> e não
// via cabeçalho HTTP, não pode aplicar "frame-ancestors"), a alternativa
// possível dentro de um HTML estático é bloquear via JS: se a página for
// carregada dentro de um iframe de outra origem, ela para de renderizar.
try{
  if(window.top !== window.self){
    document.documentElement.style.display = 'none';
    window.top.location = window.self.location;
  }
}catch(e){
  // Acesso a window.top bloqueado por cross-origin = quase certamente dentro
  // de um iframe estranho. Mais seguro tratar como tentativa de clickjacking.
  document.documentElement.style.display = 'none';
}
</script>

<script>
let baseData = [];
let etiquetas = [];
let pedidos = [];
let suppressedAuto = {};
let activeTab = 'db';
let etiquetaNav = {level:1, productKey:null, pais:null, distribuidor:null};
let etiquetaFiltros = {pais:'', projeto:'', sku:'', marca:'', submarca:'', versao:'', embalagem:'', peso:'', distribuidor:''};
let etiquetaFiltrosVisiveis = false;
let dbFilter = '';
let pedidosView = {mode:'list', pedidoId:null};
const TODAY = new Date().toISOString().slice(0,10);

const $ = sel => document.querySelector(sel);
const $$ = sel => Array.from(document.querySelectorAll(sel));
const escapeHtml = s => String(s==null?'':s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

function uid(prefix){ return prefix+'_'+Date.now().toString(36)+Math.random().toString(36).slice(2,7); }

function totalRecords(){ return etiquetas.length + pedidos.length; }

function toast(msg){
  const root = $('#toast-root');
  const el = document.createElement('div');
  el.className='toast'; el.textContent=msg;
  root.innerHTML=''; root.appendChild(el);
  setTimeout(()=>{ if(el.parentNode) el.parentNode.removeChild(el); }, 3200);
}

window.addEventListener('app:authenticated', async () => {
    await boot();
}, { once: true });

async function loadAll(){
  try{ baseData = (await window.__appBackend.get('baseData')) || []; }catch(e){ baseData = []; handleDataError(e, 'Erro ao carregar a Base de Dados.'); }
  try{ etiquetas = (await window.__appBackend.get('etiquetas')) || []; }catch(e){ etiquetas = []; handleDataError(e, 'Erro ao carregar as Etiquetas.'); }
  try{ pedidos = (await window.__appBackend.get('pedidos')) || []; }catch(e){ pedidos = []; handleDataError(e, 'Erro ao carregar os Pedidos.'); }
  try{ suppressedAuto = (await window.__appBackend.get('suppressedAuto')) || {}; }catch(e){ suppressedAuto = {}; }
}

// Trata falhas de leitura/escrita sem expor detalhes internos da exceção ao usuário.
// Se o erro for de permissão (sessão expirada, token revogado, regras do Firestore),
// força o logout em vez de deixar a tela num estado inconsistente.
function handleDataError(e, mensagemGenerica){
  const code = e && e.code ? String(e.code) : '';
  if(code.includes('permission-denied') || code.includes('unauthenticated')){
    toast('Sua sessão expirou ou não tem mais permissão de acesso. Saindo...');
    setTimeout(()=>{ if(typeof window.logout === 'function') window.logout(); }, 1500);
    return;
  }
  toast(mensagemGenerica);
}

async function safeSet(key, value){
  try{
    const json = JSON.stringify(value);
    // Guarda defensiva no cliente: o Firestore recusa documentos > 1MB.
    // Isso não substitui validação no servidor (Regras do Firestore) —
    // é só para dar um aviso claro antes de tentar gravar algo grande demais.
    if(json && json.length > 900000){
      toast('Esse conjunto de dados ficou grande demais para salvar de uma vez. Fale com o suporte técnico.');
      return false;
    }
    await window.__appBackend.set(key, value);
    return true;
  }catch(e){
    handleDataError(e, 'Não foi possível salvar. Tente novamente.');
    return false;
  }
}

async function saveBaseData(){ await safeSet('baseData', baseData); }
async function saveEtiquetas(){ await safeSet('etiquetas', etiquetas); }
async function savePedidos(){ await safeSet('pedidos', pedidos); }
async function saveSuppressed(){ await safeSet('suppressedAuto', suppressedAuto); }

function dayOfYear(d){
  const start = new Date(d.getFullYear(),0,1);
  return Math.floor((d - start) / 86400000) + 1;
}
function calcLote(dateStr){
  if(!dateStr) return '';
  const d = new Date(dateStr+'T00:00:00');
  if(isNaN(d.getTime())) return '';
  const year = String(d.getFullYear()).slice(-2);
  const doy = String(dayOfYear(d)).padStart(3,'0');
  return 'L'+year+doy;
}
function calcLoteAntesDe(dateStr){
  if(!dateStr) return '';
  const d = new Date(dateStr+'T00:00:00');
  if(isNaN(d.getTime())) return '';
  d.setDate(d.getDate()-1);
  return calcLote(d.toISOString().slice(0,10));
}

function productKeyOf(r){
  return [r.marca,r.submarca,r.versao,r.embalagem,r.peso,r.sku].join('|').toUpperCase();
}

function groupProducts(){
  const map = new Map();
  baseData.forEach(r=>{
    const key = productKeyOf(r);
    if(!map.has(key)){
      map.set(key, {key, marca:r.marca, submarca:r.submarca, versao:r.versao, embalagem:r.embalagem, peso:r.peso, sku:r.sku, rows:[]});
    }
    map.get(key).rows.push(r);
  });
  return Array.from(map.values());
}

function uniqueFieldValues(field){
  const vals = new Set();
  baseData.forEach(r=>{ const v=(r[field]||'').trim(); if(v) vals.add(v); });
  return Array.from(vals).sort((a,b)=>a.localeCompare(b));
}

function applyEtiquetaFiltros(products){
  const f = etiquetaFiltros;
  return products.filter(p=>{
    if(f.marca && p.marca!==f.marca) return false;
    if(f.submarca && p.submarca!==f.submarca) return false;
    if(f.versao && p.versao!==f.versao) return false;
    if(f.embalagem && p.embalagem!==f.embalagem) return false;
    if(f.peso && p.peso!==f.peso) return false;
    if(f.sku && p.sku!==f.sku) return false;
    if(f.pais && !p.rows.some(r=>r.pais===f.pais)) return false;
    if(f.projeto && !p.rows.some(r=>r.projeto===f.projeto)) return false;
    if(f.distribuidor && !p.rows.some(r=>(r.distribuidor||'')===f.distribuidor)) return false;
    return true;
  });
}

function productDisplayName(p){

  return parts.join(' · ');
}

function nodeKeyOf(productKey, pais, distribuidor){
  return productKey+'::'+pais+'::'+(distribuidor||'');
}

function autoNomeEtiqueta(row, distribuidor){
  const parts = [row.codigo, row.projeto, row.pais, row.marca, (row.submarca&&row.submarca!=='-')?row.submarca:'', row.versao, row.embalagem, row.peso, row.sku, distribuidor||''];
  return parts.filter(Boolean).join(' ');
}

function computeFamilyStatus(nodeKey){
  const list = etiquetas
    .filter(e=>e.nodeKey===nodeKey && e.dataStartup)
    .slice()
    .sort((a,b)=> a.dataStartup.localeCompare(b.dataStartup));
  let vigente = null;
  for(const e of list){
    if(e.dataStartup <= TODAY) vigente = e; else break;
  }
  let next = null;
  if(vigente){
    next = list.find(e=> e.dataStartup > vigente.dataStartup) || null;
  } else if(list.length){
    next = list[0];
  }
  return {list, vigente, next};
}

function loteRecomendado(e, status){
  if(!status.vigente || status.vigente.id !== e.id) return null;
  if(status.next) return calcLoteAntesDe(status.next.dataStartup);
  return calcLote(TODAY);
}

function syncEtiquetasFromBaseData(){
  let created=0, updated=0, removed=0;
  const validAutoKeys = new Set();

  baseData.forEach(row=>{
    if(!row.startup || !row.startup.trim()) return;
    const startup = row.startup.trim();
    const productKey = productKeyOf(row);
    const nodeKey = nodeKeyOf(productKey, row.pais, row.distribuidor||null);
    const autoKey = nodeKey+'::'+row.codigo+'::'+row.projeto;
    validAutoKeys.add(autoKey);
    const nome = autoNomeEtiqueta(row, row.distribuidor);

    const existingAuto = etiquetas.find(e=> e.autoKey===autoKey);
    if(existingAuto){
      if(existingAuto.dataStartup!==startup || existingAuto.nomeEtiqueta!==nome || existingAuto.sku!==row.sku){
        existingAuto.dataStartup = startup;
        existingAuto.nomeEtiqueta = nome;
        existingAuto.sku = row.sku;
        updated++;
      }
      return;
    }
    if(suppressedAuto[autoKey] === startup) return;
    if(suppressedAuto[autoKey] !== undefined && suppressedAuto[autoKey] !== startup){
      delete suppressedAuto[autoKey];
    }
    etiquetas.push({
      id: uid('etq'), source:'auto', autoKey, nodeKey,
      productKey, sku: row.sku, pais: row.pais, distribuidor: row.distribuidor||null,
      nomeEtiqueta: nome, dataStartup: startup, observacoes:'',
      criadoEm: new Date().toISOString()
    });
    created++;
  });

  const before = etiquetas.length;
  etiquetas = etiquetas.filter(e=> e.source!=='auto' || validAutoKeys.has(e.autoKey));
  removed = before - etiquetas.length;

  return {created, updated, removed};
}

function parseDelimited(text){
  const delim = (text.split('\n')[0].split('\t').length > text.split('\n')[0].split(',').length) ? '\t' : ',';
  const rows = [];
  let i=0, field='', row=[], inQuotes=false;
  while(i < text.length){
    const c = text[i];
    if(inQuotes){
      if(c === '"'){
        if(text[i+1] === '"'){ field += '"'; i++; } else { inQuotes = false; }
      } else { field += c; }
    } else {
      if(c === '"'){ inQuotes = true; }
      else if(c === delim){ row.push(field); field=''; }
      else if(c === '\n' || c === '\r'){
        if(c === '\r' && text[i+1] === '\n') i++;
        row.push(field); field='';
        if(row.some(f=>f.trim()!=='')) rows.push(row);
        row = [];
      } else { field += c; }
    }
    i++;
  }
  if(field !== '' || row.length){ row.push(field); if(row.some(f=>f.trim()!=='')) rows.push(row); }
  return rows;
}

function importRowsToDatabase(rows){
  let start = 0;
  if(rows.length && /c[oó]digo/i.test(rows[0][0]||'')) start = 1;
  let added=0, updated=0, unchanged=0;
  const idBase = Date.now();
  let idCounter = 0;

  for(let r=start; r<rows.length; r++){
    const cols = rows[r];
    if(!cols || cols.every(c=>!c || !c.trim())) continue;
    const [codigo,pais,projeto,skuRaw,marca,submarca,versao,embalagem,peso,distribuidor,startup] = cols.map(c=>(c||'').replace(/\s+/g,' ').trim());
    if(!skuRaw) continue;
    const skus = skuRaw.includes('/') ? skuRaw.split('/').map(s=>s.trim()).filter(Boolean) : [skuRaw];
    skus.forEach(sku=>{
      const skuU = sku.toUpperCase();
      const newVals = {codigo:codigo||'', pais:pais||'', projeto:projeto||'', sku:skuU, marca:marca||'', submarca:submarca||'', versao:versao||'', embalagem:embalagem||'', peso:peso||'', distribuidor:distribuidor||'', startup:startup||''};
      const existing = baseData.find(k=> k.codigo===newVals.codigo && k.projeto===newVals.projeto && k.sku===newVals.sku);
      if(existing){
        const changed = Object.keys(newVals).some(k=> (existing[k]||'') !== (newVals[k]||''));
        if(changed){ Object.assign(existing, newVals); updated++; } else { unchanged++; }
      } else {
        baseData.push({id:'db_'+idBase+'_'+(idCounter++)+'_'+Math.random().toString(36).slice(2,6), ...newVals});
        added++;
      }
    });
  }
  return {added, updated, unchanged};
}

function openDbRowModal(id){
  const row = id ? baseData.find(r=>r.id===id) : null;
  openModal({
    title: row ? 'Editar registro' : 'Novo registro',
    bodyHtml: dbRowFormHtml(row),
    footHtml: `
      ${row ? '<button class="btn warn small" id="modal-delete">Excluir</button>' : ''}
      <button class="btn secondary" id="modal-cancel">Cancelar</button>
      <button class="btn" id="modal-save">Salvar</button>
    `,
    onMount:()=>{
      $('#modal-cancel').onclick = closeModal;
      $('#modal-save').onclick = async ()=>{
        const data = {
          codigo:$('#f-codigo').value.trim(), pais:$('#f-pais').value.trim(), projeto:$('#f-projeto').value.trim(),
          sku:$('#f-sku').value.trim().toUpperCase(), marca:$('#f-marca').value.trim(), submarca:$('#f-submarca').value.trim(),
          versao:$('#f-versao').value.trim(), embalagem:$('#f-embalagem').value.trim(), peso:$('#f-peso').value.trim(),
          distribuidor:$('#f-distribuidor').value.trim(), startup:$('#f-startup').value.trim()
        };
        if(!data.sku){ toast('Informe o SKU.'); return; }
        if(row){
          Object.assign(row, data);
        } else {
          const skus = data.sku.includes('/') ? data.sku.split('/').map(s=>s.trim()).filter(Boolean) : [data.sku];
          skus.forEach(sku=> baseData.push({id:uid('db'), ...data, sku}));
        }
        await saveBaseData();
        closeModal();
        await runSync(true);
      };
      if(row){
        $('#modal-delete').onclick = async ()=>{
          if(!(await confirmModal('Excluir este registro da base de dados?'))) return;
          baseData = baseData.filter(r=>r.id!==row.id);
          await saveBaseData();
          closeModal();
          await runSync(true);
        };
      }
    }
  });
}

function renderLevel4(){
  const p = groupProducts().find(g=>g.key===etiquetaNav.productKey);
  if(!p) return `<div class="empty-state"><h3>Produto não encontrado</h3></div>`;
  const nodeKey = nodeKeyOf(etiquetaNav.productKey, etiquetaNav.pais, etiquetaNav.distribuidor);
  const status = computeFamilyStatus(nodeKey);
  const { list, vigente } = status;

  let html = `
    <div class="section-title">
      <h2>${escapeHtml(productDisplayName(p))} · SKU ${escapeHtml(p.sku)}</h2>
      <div class="rule"></div>

  if(!list.length){
    html += `<div class="empty-state"><h3>Nenhuma etiqueta cadastrada</h3><p>Preencha a Data de Startup na Base de Dados para este produto/país${etiquetaNav.distribuidor?'/distribuidor':''} — a etiqueta é gerada automaticamente ao salvar. Também é possível criar uma etiqueta manual.</p></div>`;
    return html;
  }

  if(vigente) html += renderEtiquetaCard(vigente, status, true);

  const historico = list.filter(e=> e!==vigente).sort((a,b)=> b.dataStartup.localeCompare(a.dataStartup));
  if(historico.length){

    historico.forEach(e=> html += renderEtiquetaCard(e, status, false));
  }

  return html;
}

        <button class="btn secondary small btn-edit-etiqueta" data-id="${e.id}">Editar</button>

}

function findMatchingBaseRows(){
  const p = groupProducts().find(g=>g.key===etiquetaNav.productKey);
  if(!p) return [];
  return p.rows.filter(r=>{
    if(r.pais !== etiquetaNav.pais) return false;
    const rd = (r.distribuidor||'').trim();
    if(etiquetaNav.distribuidor) return rd === etiquetaNav.distribuidor;
    return !rd;
  });
}

function openEtiquetaModal(existing){
  const sourceRows = findMatchingBaseRows();
  const uniqueSources = [];

  sourceRows.forEach(r=>{
    const k = r.codigo+'|'+r.projeto;
    if(!seen.has(k)){ seen.add(k); uniqueSources.push(r); }

  let chosenSource = uniqueSources[0] || null;

  const bodyHtml = `
    ${(!existing && uniqueSources.length>1) ? `

          ${uniqueSources.map((r,i)=>`<option value="${i}">${escapeHtml(r.codigo)} — ${escapeHtml(r.projeto)}${r.startup? ' (startup: '+escapeHtml(r.startup)+')' : ''}</option>`).join('')}
        </select>
        <div class="field-hint">Vários registros da base correspondem a este produto/país/distribuidor. Escolha qual usar para preencher o nome e o startup automaticamente.</div>

    </div>
    <div class="field">
      <label>Data Startup</label>
      <input type="date" id="f-data-startup" value="${escapeHtml(defaultStartup)}">
      <div class="field-hint">Puxada automaticamente da Base de Dados quando disponível. Pode ajustar se necessário.</div>
    </div>
    <div class="field">
      <label>Observações</label>
      <textarea id="f-obs" rows="3">${escapeHtml(existing ? existing.observacoes : '')}</textarea>
    </div>
  `;

  openModal({
    title: existing ? 'Editar etiqueta' : 'Nova etiqueta manual',
    bodyHtml,
    footHtml: `<button class="btn secondary" id="modal-cancel">Cancelar</button><button class="btn" id="modal-save">Salvar</button>`,
    onMount:()=>{
      $('#modal-cancel').onclick = closeModal;

        $('#f-source').onchange = (ev)=>{
          chosenSource = uniqueSources[parseInt(ev.target.value,10)];
          $('#f-nome-etiqueta').value = autoNomeEtiqueta(chosenSource, etiquetaNav.distribuidor);
          if(chosenSource.startup) $('#f-data-startup').value = chosenSource.startup;
        };
      }
      $('#modal-save').onclick = async ()=>{
        const nome = $('#f-nome-etiqueta').value.trim();
        const dataStartup = $('#f-data-startup').value;
        if(!nome){ toast('Informe o nome da etiqueta.'); return; }
        if(!dataStartup){ toast('Informe a Data Startup.'); return; }
        if(!existing && totalRecords() >= 999){ toast('Limite de 999 registros atingido.'); return; }
        const p = groupProducts().find(g=>g.key===etiquetaNav.productKey);
        const nodeKey = nodeKeyOf(etiquetaNav.productKey, etiquetaNav.pais, etiquetaNav.distribuidor);
        if(existing){
          existing.nomeEtiqueta = nome;
          existing.dataStartup = dataStartup;
          existing.observacoes = $('#f-obs').value.trim();
        } else {
          etiquetas.push({
            id: uid('etq'), source:'manual', nodeKey,

  });
}

function parseSkuPaste(text){
  const tokens = text.split(/[\r\n\t,;]+/).map(s=>s.trim());
  const skus = [];
  tokens.forEach(tok=>{
    if(/^\d{6,}$/.test(tok)) skus.push(tok.toUpperCase());
  });
  return Array.from(new Set(skus));
}

function skusDoPedido(p){
  if(p.skus) return p.skus;
  return (p.itens||[]).map(it=>it.sku);
}

function buildPedidoRows(p){
  return skusDoPedido(p).map(sku=>{
    const baseRow = baseData.find(r=>r.sku===sku && r.pais===p.pais && ((r.distribuidor||'')===(p.distribuidor||'')));
    let etiquetaVigente = null;
    if(baseRow){
      const productKey = productKeyOf(baseRow);
      const nodeKey = nodeKeyOf(productKey, p.pais, p.distribuidor || null);
      const status = computeFamilyStatus(nodeKey);
      const candidates = status.list.filter(e=> e.dataStartup <= p.data);
      candidates.sort((a,b)=> b.dataStartup.localeCompare(a.dataStartup));
      etiquetaVigente = candidates[0] || null;
      const next = status.list.find(e=> etiquetaVigente && e.dataStartup > etiquetaVigente.dataStartup) || null;
      if(etiquetaVigente) etiquetaVigente = {...etiquetaVigente, _next: next};
    }
    const lote = etiquetaVigente ? (etiquetaVigente._next ? calcLoteAntesDe(etiquetaVigente._next.dataStartup) : calcLote(p.data)) : '';
    const nomeProduto = baseRow
      ? [baseRow.marca, baseRow.submarca!=='-'?baseRow.submarca:'', baseRow.versao, baseRow.embalagem, baseRow.peso].filter(Boolean).join(' · ')
      : '';
    return {sku, baseRow, etiquetaVigente, lote, nomeProduto};
  });
}

// Neutraliza "Injeção de Fórmula" (CSV/Excel Formula Injection): se algum valor
// vindo da Base de Dados começar com =, +, -, @ (ou tab/CR), o Excel pode
// interpretá-lo como fórmula ao abrir o arquivo. Prefixamos com um apóstrofo
// para forçar leitura como texto puro.
function sanitizeForExcel(value){
  const s = String(value == null ? '' : value);
  return /^[=+\-@\t\r]/.test(s) ? "'" + s : s;
}

function exportPedidoExcel(p){
  if(typeof XLSX === 'undefined'){
    toast('Não foi possível carregar o gerador de Excel. Verifique sua conexão e tente novamente.');
    return;
  }
  const rows = buildPedidoRows(p);
  const data = rows.map(r=>({
    'SKU': sanitizeForExcel(r.sku),
    'Nome do Produto': sanitizeForExcel(r.nomeProduto || '—'),
    'Etiqueta': sanitizeForExcel(r.etiquetaVigente ? r.etiquetaVigente.nomeEtiqueta : 'Sem etiqueta vigente'),
    'Lote Recomendado': sanitizeForExcel(r.lote || '—')
  }));
  const ws = XLSX.utils.json_to_sheet(data);
  ws['!cols'] = [{wch:14},{wch:46},{wch:46},{wch:16}];
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Pedido');
  XLSX.writeFile(wb, `Pedido_${(p.numero||'sem_numero').replace(/[^\w-]+/g,'_')}.xlsx`);
}

function openModal({title, bodyHtml, footHtml, onMount}){
  const root = $('#modal-root');
  root.innerHTML = `
    <div class="modal-backdrop" id="modal-backdrop">
      <div class="modal">
        <div class="modal-head"><h3>${escapeHtml(title)}</h3><button class="modal-close" id="modal-x">&times;</button></div>
        <div class="modal-body">${bodyHtml}</div>
        <div class="modal-foot">${footHtml}</div>
      </div>
    </div>
  `;
  $('#modal-x').onclick = closeModal;
  $('#modal-backdrop').addEventListener('click', (e)=>{ if(e.target.id==='modal-backdrop') closeModal(); });
  if(onMount) onMount();
}
function closeModal(){ $('#modal-root').innerHTML = ''; }

function confirmModal(message){
  return new Promise(resolve=>{
    openModal({
      title:'Confirmar ação',
      bodyHtml:`<p style="margin:0; font-size:14px; color:var(--ink); line-height:1.5;">${escapeHtml(message)}</p>`,
      footHtml:`<button class="btn secondary" id="confirm-cancel">Cancelar</button><button class="btn warn" id="confirm-ok">Confirmar</button>`,
      onMount:()=>{
        $('#confirm-cancel').onclick = ()=>{ closeModal(); resolve(false); };
        $('#confirm-ok').onclick = ()=>{ closeModal(); resolve(true); };
      }
    });

}

function buildHashParams(){
  const params = new URLSearchParams();
  params.set('tab', activeTab);
  if(activeTab==='etiquetas'){
    params.set('level', String(etiquetaNav.level));
    if(etiquetaNav.productKey) params.set('product', etiquetaNav.productKey);
    if(etiquetaNav.pais) params.set('pais', etiquetaNav.pais);
    if(etiquetaNav.distribuidor) params.set('dist', etiquetaNav.distribuidor);
  }
  if(activeTab==='pedidos' && pedidosView.mode==='detail' && pedidosView.pedidoId){
    params.set('pedido', pedidosView.pedidoId);
  }
  return params;
}

function syncUrlFromState(){
  const newHash = '#' + buildHashParams().toString();
  if(location.hash !== newHash){
    history.pushState(null, '', newHash);
  }
}

function applyStateFromUrl(){
  const params = new URLSearchParams(location.hash.replace(/^#/, ''));
  const tab = params.get('tab');
  if(tab && ['db','etiquetas','pedidos'].includes(tab)) activeTab = tab;
  if(activeTab==='etiquetas'){
    const level = parseInt(params.get('level')||'1', 10);
    etiquetaNav = {
      level: (level>=1 && level<=4) ? level : 1,
      productKey: params.get('product') || null,
      pais: params.get('pais') || null,
      distribuidor: params.get('dist') || null
    };
  } else {
    etiquetaNav = {level:1, productKey:null, pais:null, distribuidor:null};
  }
  if(activeTab==='pedidos'){
    const pedidoId = params.get('pedido');
    pedidosView = pedidoId ? {mode:'detail', pedidoId} : {mode:'list', pedidoId:null};
  } else {
    pedidosView = {mode:'list', pedidoId:null};
  }
}

window.addEventListener('popstate', ()=>{
  applyStateFromUrl();
  render();
});

function render(){
  $('#record-count').textContent = totalRecords();
  $$('.tab-btn').forEach(b=> b.classList.toggle('active', b.dataset.tab===activeTab));
  const content = $('#tab-content');
  if(activeTab==='db') content.innerHTML = renderDbTab();
  else if(activeTab==='etiquetas') content.innerHTML = renderEtiquetasTab();
  else if(activeTab==='pedidos') content.innerHTML = renderPedidosTab();
  bindTabEvents();
  syncUrlFromState();
}

async function runSync(showToast){
  const r = syncEtiquetasFromBaseData();
  await saveEtiquetas();
  await saveSuppressed();
  render();
  if(showToast) toast(`Vigências atualizadas: ${r.created} nova(s), ${r.updated} atualizada(s), ${r.removed} removida(s).`);
  return r;
}

function bindTabEvents(){
  if(activeTab==='db'){
    const search = $('#db-search');
    if(search){
      search.oninput = ()=>{ dbFilter = search.value; render(); search.focus(); search.setSelectionRange(search.value.length, search.value.length); };
    }
    const addBtn = $('#btn-add-row'); if(addBtn) addBtn.onclick = ()=> openDbRowModal(null);
    $$('.btn-edit-row').forEach(b=> b.onclick = ()=> openDbRowModal(b.dataset.id));
    const importBtn = $('#btn-import-csv');
    const fileInput = $('#file-import');
    if(importBtn) importBtn.onclick = ()=> fileInput.click();
    if(fileInput) fileInput.onchange = async (e)=>{
      const file = e.target.files[0];
      if(!file) return;
      const MAX_SIZE = 5 * 1024 * 1024; // 5MB — mais que suficiente para uma planilha de base de dados
      const nomeOk = /\.(csv|tsv|txt)$/i.test(file.name);
      if(!nomeOk){
        toast('Formato de arquivo não suportado. Envie um .csv, .tsv ou .txt.');
        fileInput.value = '';
        return;
      }
      if(file.size > MAX_SIZE){
        toast('Arquivo muito grande (limite de 5MB).');
        fileInput.value = '';
        return;
      }
      let text;
      try{
        text = await file.text();
      }catch(err){
        toast('Não foi possível ler o arquivo.');
        fileInput.value = '';
        return;
      }
      let r, s;
      try{
        const rows = parseDelimited(text);
        r = importRowsToDatabase(rows);
        await saveBaseData();
        s = syncEtiquetasFromBaseData();
        await saveEtiquetas();
        await saveSuppressed();
      }catch(err){
        toast('Não foi possível processar o arquivo. Confira o formato e tente novamente.');
        fileInput.value = '';
        return;
      }
      fileInput.value = '';
      render();
      toast(`Base: ${r.added} novo(s), ${r.updated} atualizado(s), ${r.unchanged} sem alteração. Etiquetas: ${s.created} nova(s), ${s.updated} atualizada(s), ${s.removed} removida(s).`);
    };
  }
  if(activeTab==='etiquetas'){
    const syncTopBtn = $('#btn-sync-etiquetas-top'); if(syncTopBtn) syncTopBtn.onclick = ()=> runSync(true);
    const toggleFiltrosBtn = $('#btn-toggle-filtros-etq');
    if(toggleFiltrosBtn) toggleFiltrosBtn.onclick = ()=>{
      etiquetaFiltrosVisiveis = !etiquetaFiltrosVisiveis;
      render();
    };
    $$('[data-etq-filter]').forEach(el=> el.onchange = ()=>{
      etiquetaFiltros[el.dataset.etqFilter] = el.value;
      render();
    });
    const limparFiltrosBtn = $('#btn-limpar-filtros-etq');
    if(limparFiltrosBtn) limparFiltrosBtn.onclick = ()=>{
      etiquetaFiltros = {pais:'', projeto:'', sku:'', marca:'', submarca:'', versao:'', embalagem:'', peso:'', distribuidor:''};
      render();
    };
    $$('[data-pick-product]').forEach(el=> el.onclick = ()=>{
      etiquetaNav = {level:2, productKey:el.dataset.pickProduct, pais:null, distribuidor:null};
      render();
    });
    $$('[data-pick-pais]').forEach(el=> el.onclick = ()=>{
      const p = groupProducts().find(g=>g.key===etiquetaNav.productKey);
      const rows = p.rows.filter(r=>r.pais===el.dataset.pickPais);
      const hasDist = rows.some(r=> r.distribuidor && r.distribuidor.trim());
      etiquetaNav.pais = el.dataset.pickPais;
      etiquetaNav.distribuidor = null;
      etiquetaNav.level = hasDist ? 3 : 4;
      render();
    });
    $$('[data-pick-dist]').forEach(el=> el.onclick = ()=>{
      etiquetaNav.distribuidor = el.dataset.pickDist;
      etiquetaNav.level = 4;
      render();
    });
    $$('[data-crumb]').forEach(el=> el.onclick = ()=>{
      const lvl = parseInt(el.dataset.crumb,10);
      if(lvl===1) etiquetaNav = {level:1, productKey:null, pais:null, distribuidor:null};
      else if(lvl===2){ etiquetaNav.level=2; etiquetaNav.pais=null; etiquetaNav.distribuidor=null; }
      else if(lvl===3){ etiquetaNav.level=3; etiquetaNav.distribuidor=null; }
      render();
    });
    const novaBtn = $('#btn-nova-etiqueta'); if(novaBtn) novaBtn.onclick = ()=> openEtiquetaModal(null);
    $$('.btn-edit-etiqueta').forEach(b=> b.onclick = ()=>{
      const e = etiquetas.find(x=>x.id===b.dataset.id);
      openEtiquetaModal(e);
    });
    $$('.btn-delete-etiqueta').forEach(b=> b.onclick = async ()=>{
      if(!(await confirmModal('Excluir esta etiqueta?'))) return;
      const e = etiquetas.find(x=>x.id===b.dataset.id);
      if(e && e.source==='auto' && e.autoKey){
        suppressedAuto[e.autoKey] = e.dataStartup;
        await saveSuppressed();
      }
      etiquetas = etiquetas.filter(x=>x.id!==b.dataset.id);
      await saveEtiquetas(); render(); toast('Etiqueta excluída.');
    });
  }
  if(activeTab==='pedidos'){
    const novoBtn = $('#btn-novo-pedido'); if(novoBtn) novoBtn.onclick = openPedidoModal;
    $$('[data-open-pedido]').forEach(el=> el.onclick = ()=>{
      pedidosView = {mode:'detail', pedidoId: el.dataset.openPedido};
      render();
    });
    const backBtn = $('#btn-back-pedidos'); if(backBtn) backBtn.onclick = ()=>{ pedidosView = {mode:'list', pedidoId:null}; render(); };
    const delPedBtn = $('#btn-delete-pedido');
    if(delPedBtn) delPedBtn.onclick = async ()=>{
      if(!(await confirmModal('Excluir este pedido?'))) return;
      pedidos = pedidos.filter(p=>p.id!==delPedBtn.dataset.id);
      await savePedidos();
      pedidosView = {mode:'list', pedidoId:null};
      render();
      toast('Pedido excluído.');
    };
    const excelBtn = $('#btn-excel-pedido');
    if(excelBtn) excelBtn.onclick = ()=>{
      const p = pedidos.find(x=>x.id===excelBtn.dataset.id);
      if(p) exportPedidoExcel(p);
    };
  }
}

$$('.tab-btn').forEach(b=> b.onclick = ()=>{ activeTab = b.dataset.tab; render(); });

$('#btn-excluir-tudo').onclick = async ()=>{
  if(totalRecords()===0){ toast('Não há etiquetas ou pedidos para excluir.'); return; }
  if(!(await confirmModal('Isso vai excluir TODAS as etiquetas e TODOS os pedidos (a Base de Dados não será afetada). Confirmar?'))) return;
  etiquetas = [];
  pedidos = [];
  suppressedAuto = {};
  await saveEtiquetas();
  await savePedidos();
  await saveSuppressed();
  pedidosView = {mode:'list', pedidoId:null};
  etiquetaNav = {level:1, productKey:null, pais:null, distribuidor:null};
  render();
  toast('Etiquetas e pedidos excluídos.');
};

async function boot(){
  await loadAll();
  await runSync(false);
  applyStateFromUrl();
  render();
}
</script>
